<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Dark to darker gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e13;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#050a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e13;stop-opacity:1" />
    </linearGradient>
    
    <!-- Neon glow radial -->
    <radialGradient id="neonGlow1" cx="20%" cy="20%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="neonGlow2" cx="80%" cy="80%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </radialGradient>
    
    <!-- Grid pattern -->
    <pattern id="grid" x="80" y="80" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="160" height="160" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>
      <circle cx="80" cy="80" r="2" fill="#00ff88" opacity="0.3"/>
    </pattern>
    
    <!-- Animated scan lines -->
    <pattern id="scanlines" x="1920" y="2" width="1920" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="1920" y2="0" stroke="#00ff88" stroke-width="1" opacity="0.08"/>
      <line x1="0" y1="2" x2="1920" y2="2" stroke="#00ff88" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>
  
  <!-- Main background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Neon glow overlays -->
  <rect width="1920" height="1080" fill="url(#neonGlow1)"/>
  <rect width="1920" height="1080" fill="url(#neonGlow2)"/>
  
  <!-- Grid pattern -->
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Scan lines -->
  <rect width="1920" height="1080" fill="url(#scanlines)"/>
  
  <!-- Neon glow lines -->
  <line x1="0" y1="270" x2="1920" y2="270" stroke="#00ff88" stroke-width="1" opacity="0.12"/>
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#00ff88" stroke-width="1" opacity="0.12"/>
  <line x1="0" y1="810" x2="1920" y2="810" stroke="#00ff88" stroke-width="1" opacity="0.12"/>
  
  <!-- Vertical accent lines -->
  <line x1="384" y1="0" x2="384" y2="1080" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
  <line x1="960" y1="0" x2="960" y2="1080" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
  <line x1="1536" y1="0" x2="1536" y2="1080" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
  
  <!-- Corner glow accents -->
  <circle cx="50" cy="50" r="150" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.1"/>
  <circle cx="1870" cy="1030" r="150" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.1"/>
</svg>
