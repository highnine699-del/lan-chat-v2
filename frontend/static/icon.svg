<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#050508"/>

  <!-- Hexagon outline -->
  <polygon
    points="100,18 168,57 168,135 100,174 32,135 32,57"
    fill="none"
    stroke="#00f5c4"
    stroke-width="2.5"
    filter="url(#glow)"
    opacity="0.9"
  />

  <!-- Inner hexagon (subtle) -->
  <polygon
    points="100,38 150,66 150,122 100,150 50,122 50,66"
    fill="none"
    stroke="#00f5c4"
    stroke-width="0.8"
    opacity="0.2"
  />

  <!-- Node positions:
       Center: 100,96
       Top: 100,52
       Top-right: 138,74
       Bottom-right: 138,118
       Bottom: 100,140
       Top-left: 62,74
       Bottom-left: 62,118
  -->

  <!-- Connection lines -->
  <g stroke="#00f5c4" stroke-width="1.2" opacity="0.5" filter="url(#glow)">
    <!-- Center to all -->
    <line x1="100" y1="96" x2="100" y2="52"/>
    <line x1="100" y1="96" x2="138" y2="74"/>
    <line x1="100" y1="96" x2="138" y2="118"/>
    <line x1="100" y1="96" x2="100" y2="140"/>
    <line x1="100" y1="96" x2="62"  y2="118"/>
    <line x1="100" y1="96" x2="62"  y2="74"/>
    <!-- Outer ring connections -->
    <line x1="100" y1="52"  x2="138" y2="74"/>
    <line x1="138" y1="74"  x2="138" y2="118"/>
    <line x1="138" y1="118" x2="100" y2="140"/>
    <line x1="100" y1="140" x2="62"  y2="118"/>
    <line x1="62"  y1="118" x2="62"  y2="74"/>
    <line x1="62"  y1="74"  x2="100" y2="52"/>
  </g>

  <!-- Nodes — outer ring -->
  <g fill="#00f5c4" filter="url(#glow)">
    <circle cx="100" cy="52"  r="3.5" opacity="0.85"/>
    <circle cx="138" cy="74"  r="3.5" opacity="0.85"/>
    <circle cx="138" cy="118" r="3.5" opacity="0.85"/>
    <circle cx="100" cy="140" r="3.5" opacity="0.85"/>
    <circle cx="62"  cy="118" r="3.5" opacity="0.85"/>
    <circle cx="62"  cy="74"  r="3.5" opacity="0.85"/>
  </g>

  <!-- Center node — brighter -->
  <circle cx="100" cy="96" r="5" fill="#00f5c4" filter="url(#glow-strong)" opacity="1"/>
  <circle cx="100" cy="96" r="2.5" fill="#ffffff" opacity="0.9"/>
</svg>
