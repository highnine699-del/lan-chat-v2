<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAN Chat</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Emoji Picker -->
  <script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js" type="module"></script>
  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    :root {
      --bg-primary: #111b21;
      --bg-secondary: #202c33;
      --bg-tertiary: #2a3942;
      --bg-chat: #0b141a;
      --bubble-me: #005c4b;
      --bubble-other: #202c33;
      --text-primary: #e9edef;
      --text-secondary: #8696a0;
      --text-muted: #667781;
      --accent: #00a884;
      --accent-hover: #06cf9c;
      --border: #2a3942;
      --danger: #ef4444;
      --icon-btn: #aebac1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* LOGIN SCREEN */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-box {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-logo {
      width: 80px;
      height: 80px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }

    .login-box h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .login-box p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .login-input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    .login-input:focus {
      border-color: var(--accent);
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .login-btn:hover {
      background: var(--accent-hover);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* APP LAYOUT */
    #app {
      display: none;
      height: 100vh;
      flex-direction: row;
    }

    /* SIDEBAR */
    .sidebar {
      width: 360px;
      min-width: 300px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg-secondary);
      height: 60px;
      flex-shrink: 0;
    }

    .my-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    .sidebar-title {
      font-size: 20px;
      font-weight: 600;
    }

    .search-bar {
      padding: 8px 12px;
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      background: var(--bg-primary);
      border: none;
      border-radius: 8px;
      padding: 9px 14px 9px 38px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      position: relative;
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-list::-webkit-scrollbar {
      width: 6px;
    }

    .chat-list::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .chat-item:hover {
      background: var(--bg-tertiary);
    }

    .chat-item.active {
      background: var(--bg-tertiary);
    }

    .chat-avatar {
      width: 49px;
      height: 49px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .chat-item-info {
      flex: 1;
      min-width: 0;
    }

    .chat-item-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .chat-item-preview {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .online-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
      min-width: 0;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-secondary);
      height: 60px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-header-info {
      flex: 1;
    }

    .chat-header-name {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header-status {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      background: none;
      border: none;
      border-radius: 50%;
      color: var(--icon-btn);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .icon-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .icon-btn.danger:hover {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8%;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #messages::-webkit-scrollbar {
      width: 6px;
    }

    #messages::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    .msg-wrapper {
      display: flex;
      margin: 2px 0;
    }

    .msg-wrapper.me {
      justify-content: flex-end;
    }

    .msg-wrapper.other {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 65%;
      padding: 7px 10px 6px;
      border-radius: 8px;
      position: relative;
      word-break: break-word;
      line-height: 1.4;
      font-size: 14.5px;
    }

    .msg-wrapper.me .bubble {
      background: var(--bubble-me);
      border-top-right-radius: 2px;
    }

    .msg-wrapper.other .bubble {
      background: var(--bubble-other);
      border-top-left-radius: 2px;
    }

    .bubble-sender {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .bubble-text {
      white-space: pre-wrap;
    }

    .bubble-time {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      text-align: right;
      margin-top: 4px;
      float: right;
      margin-left: 8px;
    }

    .bubble img {
      max-width: 280px;
      max-height: 280px;
      border-radius: 6px;
      display: block;
      cursor: pointer;
    }

    .bubble audio {
      width: 220px;
      height: 36px;
      display: block;
      margin-top: 4px;
    }

    .file-attach {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 8px 12px;
      text-decoration: none;
      color: var(--text-primary);
      min-width: 180px;
    }

    .file-attach-icon {
      font-size: 24px;
    }

    .file-attach-name {
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }

    .file-attach-size {
      font-size: 11px;
      color: var(--text-muted);
    }

    .system-msg {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin: 6px auto;
      width: fit-content;
    }

    /* TYPING INDICATOR */
    #typing-indicator {
      padding: 4px 8%;
      min-height: 20px;
      font-size: 12px;
      color: var(--accent);
      font-style: italic;
      flex-shrink: 0;
    }

    /* INPUT AREA */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 8px 10px;
      background: var(--bg-secondary);
      flex-shrink: 0;
      position: relative;
    }

    .input-box {
      flex: 1;
      background: var(--bg-primary);
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.4;
    }

    .input-box::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover {
      background: var(--accent-hover);
    }

    .send-btn:active {
      transform: scale(0.93);
    }

    /* EMOJI PICKER */
    #emoji-container {
      position: absolute;
      bottom: 70px;
      left: 10px;
      z-index: 100;
      display: none;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      overflow: hidden;
    }

    emoji-picker {
      --background: var(--bg-secondary);
      --border-color: var(--border);
      --button-hover-background: var(--bg-tertiary);
      --category-emoji-padding: 0.5rem;
      --emoji-padding: 0.4rem;
      --emoji-size: 1.3rem;
      --input-border-color: var(--border);
      --input-border-radius: 6px;
      --input-font-color: var(--text-primary);
      --input-placeholder-color: var(--text-muted);
      --num-columns: 8;
      --outline-color: var(--accent);
      --indicator-color: var(--accent);
      width: 340px;
      height: 360px;
    }

    /* FILE INPUT HIDDEN */
    #file-input {
      display: none;
    }

    /* CALL OVERLAY */
    #call-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #call-overlay.active {
      display: flex;
    }

    .call-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(0, 168, 132, 0.4);
      }

      50% {
        box-shadow: 0 0 0 20px rgba(0, 168, 132, 0);
      }
    }

    .call-name {
      font-size: 28px;
      font-weight: 600;
    }

    .call-status {
      color: var(--text-secondary);
      font-size: 15px;
      margin-top: -8px;
    }

    .call-buttons {
      display: flex;
      gap: 30px;
      margin-top: 16px;
    }

    .call-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: none;
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
    }

    .call-btn:active {
      transform: scale(0.92);
    }

    .call-btn.end {
      background: #ef4444;
      color: white;
    }

    .call-btn.accept {
      background: var(--accent);
      color: white;
    }

    .call-btn.mute {
      background: var(--bg-tertiary);
      color: white;
    }

    .call-btn.vid {
      background: var(--bg-tertiary);
      color: white;
    }

    #local-video,
    #remote-video {
      position: absolute;
      border-radius: 12px;
      object-fit: cover;
    }

    #remote-video {
      width: 300px;
      height: 200px;
      background: #111;
      top: 40px;
    }

    #local-video {
      width: 120px;
      height: 90px;
      background: #222;
      top: 40px;
      right: 40px;
    }

    /* RECORD UI */
    #record-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: var(--bg-secondary);
      height: 60px;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    #record-bar.active {
      display: flex;
    }

    .record-dot {
      width: 12px;
      height: 12px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    #record-time {
      color: var(--text-secondary);
      font-size: 14px;
      min-width: 50px;
    }

    .rec-cancel {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      margin-left: auto;
    }

    .rec-send {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* IMAGE LIGHTBOX */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
    }

    /* PLACEHOLDER */
    .chat-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
    }

    .chat-placeholder-icon {
      font-size: 80px;
      opacity: 0.3;
    }

    .chat-placeholder h2 {
      font-size: 32px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .chat-placeholder p {
      font-size: 14px;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    /* No chat selected */
    .no-chat {
      display: flex;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">💬</div>
      <h1>LAN Chat</h1>
      <p>Connect with people on your WiFi — no internet needed</p>
      <input type="text" id="username-input" class="login-input" placeholder="Enter your name..." maxlength="20"
        autocomplete="off" />
      <input type="text" id="password-input" class="login-input" placeholder="Password (optional, for identity)"
        autocomplete="off" />
      <button class="login-btn" onclick="doLogin()">Start Chatting</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div id="my-avatar" class="my-avatar" title="Your profile"></div>
        <span class="sidebar-title" id="my-name">LAN Chat</span>
      </div>

      <div class="search-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" placeholder="Search or start new chat" id="search-box"
            oninput="filterChats()" />
        </div>
      </div>

      <div class="chat-list" id="chat-list">
        <!-- Global chat always first -->
        <div class="chat-item active" onclick="switchChat('global')" id="chat-item-global">
          <div class="chat-avatar" style="background:#1a4a3a; font-size:22px;">🌍</div>
          <div class="chat-item-info">
            <div class="chat-item-name">Global Chat</div>
            <div class="chat-item-preview" id="preview-global">Everyone on the network</div>
          </div>
        </div>
        <!-- Users will appear here -->
      </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chat-area">
      <!-- Placeholder when no DM selected -->
      <div class="chat-placeholder" id="chat-placeholder">
        <div class="chat-placeholder-icon">💬</div>
        <h2>LAN Chat</h2>
        <p>Select a chat to start messaging, or go to Global Chat to talk with everyone on the network.</p>
      </div>

      <!-- Active chat view (hidden by default, shown when chat selected) -->
      <div id="active-chat" style="display:none; flex-direction:column; flex:1; min-height:0;">
        <div class="chat-header">
          <div class="chat-header-avatar" id="header-avatar"></div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="header-name">Global Chat</div>
            <div class="chat-header-status" id="header-status">Everyone online</div>
          </div>
          <div class="header-actions">
            <button class="icon-btn" onclick="startCall('voice')" title="Voice call">📞</button>
            <button class="icon-btn" onclick="startCall('video')" title="Video call">📹</button>
          </div>
        </div>

        <div id="messages"></div>
        <div id="typing-indicator"></div>

        <div class="input-area" id="input-area">
          <button class="icon-btn" onclick="toggleEmoji()" title="Emoji" id="emoji-btn">😊</button>
          <button class="icon-btn" onclick="document.getElementById('file-input').click()"
            title="Attach file">📎</button>
          <input type="file" id="file-input" onchange="sendFile(this)" />
          <textarea class="input-box" id="msg-input" placeholder="Type a message" rows="1" onkeydown="handleKey(event)"
            oninput="onTyping(this)"></textarea>
          <button class="icon-btn" id="mic-btn" onclick="toggleRecord()" title="Voice message">🎤</button>
          <button class="send-btn" onclick="sendMessage()" title="Send">➤</button>
        </div>

        <!-- Emoji Picker -->
        <div id="emoji-container">
          <emoji-picker></emoji-picker>
        </div>

        <!-- Record bar -->
        <div id="record-bar">
          <div class="record-dot"></div>
          <span>Recording...</span>
          <span id="record-time">0:00</span>
          <button class="rec-cancel" onclick="cancelRecord()" title="Cancel">✕</button>
          <button class="rec-send" onclick="stopRecord()" title="Send">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CALL OVERLAY -->
  <div id="call-overlay">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>
    <div class="call-avatar" id="call-avatar"></div>
    <div class="call-name" id="call-name"></div>
    <div class="call-status" id="call-status">Calling...</div>
    <div class="call-buttons">
      <button class="call-btn mute" id="mute-btn" onclick="toggleMute()" title="Mute">🎙️</button>
      <button class="call-btn end" onclick="endCall()" title="End call">📵</button>
      <button class="call-btn vid" id="cam-btn" onclick="toggleCam()" title="Camera">📷</button>
    </div>
  </div>

  <!-- IMAGE LIGHTBOX -->
  <div id="lightbox" onclick="document.getElementById('lightbox').classList.remove('active')">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // ─── STATE ────────────────────────────────────────────────
    const state = {
      socket: null,
      username: '',
      currentChat: 'global',
      users: [],
      chatMessages: { global: [] },
      typingTimers: {},
      typingUsers: {},
      unread: {},
      mediaRecorder: null,
      audioChunks: [],
      recordTimer: null,
      recordSeconds: 0,
      peerConnection: null,
      localStream: null,
      callTarget: null,
      callType: null,
      muted: false,
      camOff: false,
      callState: 'idle',
      callTimeout: null,
      iceCandidateBuffer: [],  // Buffer ICE candidates until connection ready
    };

    document.getElementById('username-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password-input').focus();
    });
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    // ─── SOCKET ────────────────────────────────────────────────
    function connectSocket() {
      state.socket = io();
      const s = state.socket;

      s.on('connect', () => {
        s.emit('join', { username: state.username });
      });

      s.on('user_list', users => {
        state.users = users;
        renderUserList(users);
      });

      s.on('message_history', msgs => {
        msgs.forEach(m => addMessage(m, false));
      });

      s.on('new_message', msg => {
        addMessage(msg, true);
        // Unread badge
        if (msg.to === 'global' && state.currentChat !== 'global') {
          incrementUnread('global');
        } else if (msg.to !== 'global') {
          const other = msg.from === state.username ? msg.to : msg.from;
          if (other !== state.currentChat) {
            incrementUnread(other);
          }
        }
      });

      s.on('system_message', msg => {
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.textContent = msg.text;
        document.getElementById('messages').appendChild(div);
        scrollToBottom();
      });

      s.on('typing', data => {
        if (data.username === state.username) return;
        const chatId = data.to === 'global' ? 'global' : data.username;
        if (!state.typingUsers[chatId]) state.typingUsers[chatId] = new Set();
        state.typingUsers[chatId].add(data.username);
        renderTyping();
        clearTimeout(state.typingTimers[data.username]);
        state.typingTimers[data.username] = setTimeout(() => {
          if (state.typingUsers[chatId]) state.typingUsers[chatId].delete(data.username);
          renderTyping();
        }, 2000);
      });

      s.on('stop_typing', data => {
        const chatId = data.to === 'global' ? 'global' : data.username;
        if (state.typingUsers[chatId]) state.typingUsers[chatId].delete(data.username);
        renderTyping();
      });

      s.on('webrtc_signal', handleSignal);
    }

    // ─── MESSAGES ─────────────────────────────────────────────
    function addMessage(msg, live) {
      const chatId = msg.to === 'global' ? 'global'
        : (msg.from === state.username ? msg.to : msg.from);

      if (!state.chatMessages[chatId]) state.chatMessages[chatId] = [];
      state.chatMessages[chatId].push(msg);

      // Update sidebar preview
      updatePreview(chatId, msg);

      // Only render to DOM if we're viewing this chat
      if (chatId === state.currentChat) {
        renderMsg(msg);
        if (live) scrollToBottom();
      }
    }

    function renderMsg(msg) {
      const isMe = msg.from === state.username;
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper ' + (isMe ? 'me' : 'other');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      // Sender name (only in global and not me)
      if (!isMe && msg.to === 'global') {
        const sender = document.createElement('div');
        sender.className = 'bubble-sender';
        sender.style.color = msg.color || '#25d366';
        sender.textContent = msg.from;
        bubble.appendChild(sender);
      }

      // Content
      if (msg.type === 'text') {
        const text = document.createElement('div');
        text.className = 'bubble-text';
        text.textContent = msg.text;
        bubble.appendChild(text);
      } else if (msg.type === 'file') {
        const el = renderFileContent(msg);
        bubble.appendChild(el);
      }

      // Time
      const time = document.createElement('div');
      time.className = 'bubble-time';
      time.textContent = formatTime(msg.time);
      bubble.appendChild(time);

      wrapper.appendChild(bubble);
      document.getElementById('messages').appendChild(wrapper);
    }

    function renderFileContent(msg) {
      const ft = msg.file_type || '';
      if (ft.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = msg.url;
        img.alt = msg.name;
        img.onclick = () => openLightbox(msg.url);
        return img;
      } else if (ft.startsWith('audio/') || msg.name?.endsWith('.webm') || msg.name?.endsWith('.ogg') || msg.name?.endsWith('.mp3')) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = msg.url;
        return audio;
      } else if (ft.startsWith('video/')) {
        const video = document.createElement('video');
        video.controls = true;
        video.src = msg.url;
        video.style.maxWidth = '260px';
        video.style.borderRadius = '6px';
        return video;
      } else {
        const a = document.createElement('a');
        a.className = 'file-attach';
        a.href = msg.url;
        a.target = '_blank';
        a.download = msg.name;
        a.innerHTML = `<span class="file-attach-icon">📄</span><div><div class="file-attach-name">${msg.name}</div><div class="file-attach-size">Tap to download</div></div>`;
        return a;
      }
    }

    function renderTyping() {
      const indicator = document.getElementById('typing-indicator');
      const users = state.typingUsers[state.currentChat];
      if (!users || users.size === 0) {
        indicator.textContent = '';
        return;
      }
      const names = [...users];
      if (names.length === 1) indicator.textContent = `${names[0]} is typing...`;
      else indicator.textContent = `${names.join(', ')} are typing...`;
    }

    function scrollToBottom() {
      const el = document.getElementById('messages');
      el.scrollTop = el.scrollHeight;
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ─── SEND MESSAGE ──────────────────────────────────────────
    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;

      state.socket.emit('send_message', { to: state.currentChat, text });
      state.socket.emit('stop_typing', { to: state.currentChat });
      input.value = '';
      input.style.height = 'auto';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    let typingTimeout;
    function onTyping(el) {
      // Auto-resize
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';

      state.socket.emit('typing', { to: state.currentChat });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        state.socket.emit('stop_typing', { to: state.currentChat });
      }, 1500);
    }

    // ─── FILE UPLOAD ────────────────────────────────────────────
    async function sendFile(input) {
      const file = input.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        state.socket.emit('send_file', {
          to: state.currentChat,
          url: data.url,
          name: data.name,
          file_type: file.type
        });
      } catch (err) {
        alert('Upload failed: ' + err.message);
      }

      input.value = '';
    }

    // ─── VOICE RECORDING ────────────────────────────────────────
    let recInterval;

    async function toggleRecord() {
      if (state.mediaRecorder && state.mediaRecorder.state === 'recording') {
        stopRecord();
      } else {
        await startRecord();
      }
    }

    async function startRecord() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.mediaRecorder = new MediaRecorder(stream);
        state.audioChunks = [];
        state.recordSeconds = 0;

        state.mediaRecorder.ondataavailable = e => state.audioChunks.push(e.data);
        state.mediaRecorder.start(100);

        document.getElementById('record-bar').classList.add('active');
        document.getElementById('mic-btn').style.color = '#ef4444';

        recInterval = setInterval(() => {
          state.recordSeconds++;
          const m = Math.floor(state.recordSeconds / 60);
          const s = state.recordSeconds % 60;
          document.getElementById('record-time').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }, 1000);
      } catch (err) {
        alert('Microphone access denied. Please allow microphone in your browser.');
      }
    }

    function stopRecord() {
      if (!state.mediaRecorder) return;
      clearInterval(recInterval);

      state.mediaRecorder.onstop = async () => {
        const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
        const formData = new FormData();
        formData.append('file', blob, 'voice_' + Date.now() + '.webm');

        try {
          const res = await fetch('/upload', { method: 'POST', body: formData });
          const data = await res.json();
          state.socket.emit('send_file', {
            to: state.currentChat,
            url: data.url,
            name: data.name,
            file_type: 'audio/webm'
          });
        } catch { }
      };

      state.mediaRecorder.stop();
      state.mediaRecorder.stream.getTracks().forEach(t => t.stop());
      state.mediaRecorder = null;
      document.getElementById('record-bar').classList.remove('active');
      document.getElementById('mic-btn').style.color = '';
    }

    function cancelRecord() {
      if (!state.mediaRecorder) return;
      clearInterval(recInterval);
      state.mediaRecorder.stream.getTracks().forEach(t => t.stop());
      state.mediaRecorder = null;
      state.audioChunks = [];
      document.getElementById('record-bar').classList.remove('active');
      document.getElementById('mic-btn').style.color = '';
    }

    // ─── EMOJI PICKER ────────────────────────────────────────────
    function toggleEmoji() {
      const container = document.getElementById('emoji-container');
      container.style.display = container.style.display === 'block' ? 'none' : 'block';
    }

    document.addEventListener('emoji-click', e => {
      document.getElementById('msg-input').value += e.detail.unicode;
      document.getElementById('emoji-container').style.display = 'none';
      document.getElementById('msg-input').focus();
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('#emoji-container') && !e.target.closest('#emoji-btn')) {
        document.getElementById('emoji-container').style.display = 'none';
      }
    });

    // ─── CHAT SWITCHING ───────────────────────────────────────────
    function switchChat(chatId) {
      state.currentChat = chatId;

      // Update active state in sidebar
      document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
      const item = document.getElementById('chat-item-' + chatId);
      if (item) item.classList.add('active');

      // Update header
      if (chatId === 'global') {
        document.getElementById('header-name').textContent = 'Global Chat';
        document.getElementById('header-status').textContent = state.users.length + ' members online';
        const av = document.getElementById('header-avatar');
        av.style.background = '#1a4a3a';
        av.style.fontSize = '20px';
        av.textContent = '🌍';
      } else {
        const user = state.users.find(u => u.username === chatId);
        document.getElementById('header-name').textContent = chatId;
        document.getElementById('header-status').textContent = 'Online';
        const av = document.getElementById('header-avatar');
        av.style.background = user ? user.color : stringToColor(chatId);
        av.style.fontSize = '18px';
        av.textContent = chatId[0].toUpperCase();
      }

      // Clear unread
      state.unread[chatId] = 0;
      const item2 = document.getElementById('chat-item-' + chatId);
      if (item2) {
        const badge = item2.querySelector('.unread-badge');
        if (badge) badge.remove();
      }

      // Render messages
      document.getElementById('messages').innerHTML = '';
      const msgs = state.chatMessages[chatId] || [];
      msgs.forEach(m => renderMsg(m));
      scrollToBottom();

      // Clear typing
      document.getElementById('typing-indicator').textContent = '';
    }

    // ─── USER LIST ────────────────────────────────────────────────
    function renderUserList(users) {
      // Remove old user items (keep global)
      document.querySelectorAll('.chat-item.user-item').forEach(el => el.remove());

      const list = document.getElementById('chat-list');

      users.forEach(u => {
        if (u.username === state.username) return;
        let item = document.getElementById('chat-item-' + u.username);
        if (!item) {
          item = document.createElement('div');
          item.className = 'chat-item user-item';
          item.id = 'chat-item-' + u.username;
          item.onclick = () => switchChat(u.username);

          const avatar = document.createElement('div');
          avatar.className = 'chat-avatar';
          avatar.style.background = u.color;
          avatar.textContent = u.username[0].toUpperCase();

          const info = document.createElement('div');
          info.className = 'chat-item-info';

          const name = document.createElement('div');
          name.className = 'chat-item-name';
          name.textContent = u.username;

          const preview = document.createElement('div');
          preview.className = 'chat-item-preview';
          preview.id = 'preview-' + u.username;
          preview.textContent = 'Click to chat privately';

          const dot = document.createElement('div');
          dot.className = 'online-dot';

          info.appendChild(name);
          info.appendChild(preview);
          item.appendChild(avatar);
          item.appendChild(info);
          item.appendChild(dot);
          list.appendChild(item);
        }

        if (u.username === state.currentChat) item.classList.add('active');
      });

      // Update header status
      if (state.currentChat === 'global') {
        document.getElementById('header-status').textContent = users.length + ' members online';
      }
    }

    function updatePreview(chatId, msg) {
      const preview = document.getElementById('preview-' + chatId);
      if (!preview) return;
      const text = msg.type === 'text' ? msg.text
        : msg.file_type?.startsWith('image') ? '📷 Image'
          : msg.file_type?.startsWith('audio') ? '🎤 Voice message'
            : '📎 File';
      preview.textContent = (msg.from === state.username ? 'You: ' : '') + text;
    }

    function incrementUnread(chatId) {
      state.unread[chatId] = (state.unread[chatId] || 0) + 1;
      const item = document.getElementById('chat-item-' + chatId);
      if (!item) return;
      let badge = item.querySelector('.unread-badge');
      if (!badge) {
        badge = document.createElement('div');
        badge.className = 'unread-badge';
        badge.style.cssText = 'background:var(--accent);color:white;border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;';
        item.appendChild(badge);
      }
      badge.textContent = state.unread[chatId];
    }

    function filterChats() {
      const query = document.getElementById('search-box').value.toLowerCase();
      document.querySelectorAll('.chat-item').forEach(item => {
        const name = item.querySelector('.chat-item-name')?.textContent.toLowerCase() || '';
        item.style.display = name.includes(query) ? '' : 'none';
      });
    }

    // ─── LIGHTBOX ────────────────────────────────────────────────
    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox').classList.add('active');
    }

    // ─── WEBRTC CALLS ────────────────────────────────────────────
    const ICE_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function startCall(type) {
      // Prevent multiple simultaneous calls
      if (state.callState !== 'idle') {
        alert('You are already in a call. End it first.');
        return;
      }

      if (state.currentChat === 'global') {
        alert('Voice/video calls are only available in private chats. Select a person first.');
        return;
      }

      // Check browser support
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('⚠️ Your browser does not support calls.\n\nTry:\n• Chrome, Firefox, Safari, or Edge\n• Access over HTTPS (or localhost)\n• Allow camera/microphone when prompted');
        return;
      }

      state.callTarget = state.currentChat;
      state.callType = type;
      state.callState = 'calling';
      state.iceCandidateBuffer = [];  // Clear buffer for new call

      console.log('[Call] Starting', type, 'call to', state.callTarget);

      const overlay = document.getElementById('call-overlay');
      overlay.classList.add('active');

      const callAvatar = document.getElementById('call-avatar');
      const user = state.users.find(u => u.username === state.callTarget);
      callAvatar.style.background = user ? user.color : stringToColor(state.callTarget);
      callAvatar.textContent = state.callTarget[0].toUpperCase();
      document.getElementById('call-name').textContent = state.callTarget;
      document.getElementById('call-status').textContent = type === 'voice' ? 'Calling...' : 'Video calling...';

      // Set timeout for unanswered calls (30 seconds)
      state.callTimeout = setTimeout(() => {
        if (state.callState === 'calling') {
          console.log('[Call] Call timeout - no answer from', state.callTarget);
          alert('📞 Call timeout - No answer from ' + state.callTarget);
          endCall();
        }
      }, 30000);

      try {
        console.log('[Call] Requesting', type === 'video' ? 'audio+video' : 'audio', 'media');
        const constraints = type === 'video' ? { audio: true, video: true } : { audio: true, video: false };
        state.localStream = await navigator.mediaDevices.getUserMedia(constraints);
        console.log('[Call] Media obtained successfully');

        if (type === 'video') {
          document.getElementById('local-video').srcObject = state.localStream;
        }

        // Clean up old peer connection if exists
        if (state.peerConnection) {
          console.log('[WebRTC] Cleaning up old peer connection');
          state.peerConnection.close();
          state.peerConnection = null;
        }

        console.log('[WebRTC] Creating new peer connection');
        state.peerConnection = new RTCPeerConnection(ICE_CONFIG);
        state.localStream.getTracks().forEach(track => {
          console.log('[WebRTC] Adding', track.kind, 'track');
          state.peerConnection.addTrack(track, state.localStream);
        });

        state.peerConnection.ontrack = e => {
          console.log('[WebRTC] Received remote', e.track.kind, 'track');
          document.getElementById('remote-video').srcObject = e.streams[0];
        };

        state.peerConnection.onicecandidate = e => {
          if (e.candidate) {
            console.log('[WebRTC] Sending ICE candidate');
            state.socket.emit('webrtc_signal', { to: state.callTarget, type: 'ice', candidate: e.candidate });
          }
        };

        state.peerConnection.onconnectionstatechange = () => {
          console.log('[WebRTC] Connection state:', state.peerConnection?.connectionState);
          if (state.peerConnection?.connectionState === 'disconnected' || state.peerConnection?.connectionState === 'failed') {
            console.warn('[WebRTC] Connection failed/disconnected, ending call');
            endCall();
          }
        };

        console.log('[Call] Creating offer');
        const offer = await state.peerConnection.createOffer();
        console.log('[Call] Setting local description with offer');
        await state.peerConnection.setLocalDescription(offer);

        console.log('[Call] Sending offer to', state.callTarget);
        state.socket.emit('webrtc_signal', { to: state.callTarget, type: 'offer', sdp: offer, callType: type });
      } catch (err) {
        console.error('[Call Error] startCall failed:', err.name, err.message);
        let errorMsg = '❌ Call failed:\n\n';
        if (err.name === 'NotAllowedError') {
          errorMsg += 'Permission denied - Please allow camera/microphone access in your browser';
        } else if (err.name === 'NotFoundError') {
          errorMsg += 'No camera/microphone found on this device';
        } else if (err.name === 'NotSupportedError') {
          errorMsg += 'Your browser does not support WebRTC calls';
        } else {
          errorMsg += err.message || 'Could not access camera/microphone';
        }
        alert(errorMsg);
        endCall();
      }
    }

    async function handleSignal(data) {
      console.log('[Signal] Received:', {
        type: data.type,
        from: data.from,
        callState: state.callState,
        callTarget: state.callTarget,
        hasPeerConnection: !!state.peerConnection
      });

      if (data.type === 'offer') {
        // Incoming call
        if (state.callState !== 'idle') {
          console.log('[Call] Already in a call, rejecting incoming');
          state.socket.emit('webrtc_signal', { to: data.from, type: 'reject' });
          return;
        }

        const accept = confirm(`📞 Incoming ${data.callType || 'voice'} call from ${data.from}. Accept?`);
        if (!accept) {
          console.log('[Call] User rejected call from', data.from);
          state.socket.emit('webrtc_signal', { to: data.from, type: 'reject' });
          return;
        }

        // Check browser support
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert('⚠️ Your browser does not support calls.\n\nTry:\n• Chrome, Firefox, Safari, or Edge\n• Access over HTTPS (or localhost)\n• Allow camera/microphone when prompted');
          state.socket.emit('webrtc_signal', { to: data.from, type: 'reject' });
          return;
        }

        state.callTarget = data.from;
        state.callType = data.callType;
        state.callState = 'ringing';
        document.getElementById('call-overlay').classList.add('active');
        document.getElementById('call-name').textContent = data.from;
        document.getElementById('call-status').textContent = 'Connecting...';

        const callAvatar = document.getElementById('call-avatar');
        const user = state.users.find(u => u.username === data.from);
        callAvatar.style.background = user ? user.color : stringToColor(data.from);
        callAvatar.textContent = data.from[0].toUpperCase();

        try {
          console.log('[Call] Accepting call - requesting media');
          const constraints = data.callType === 'video' ? { audio: true, video: true } : { audio: true, video: false };
          state.localStream = await navigator.mediaDevices.getUserMedia(constraints);
          console.log('[Call] Media obtained, creating peer connection');
          if (data.callType === 'video') document.getElementById('local-video').srcObject = state.localStream;

          // Clean up old peer connection if exists
          if (state.peerConnection) {
            state.peerConnection.close();
            state.peerConnection = null;
          }

          state.peerConnection = new RTCPeerConnection(ICE_CONFIG);
          state.localStream.getTracks().forEach(track => {
            console.log('[WebRTC] Adding track:', track.kind);
            state.peerConnection.addTrack(track, state.localStream);
          });

          state.peerConnection.ontrack = e => {
            console.log('[WebRTC] Received remote track:', e.track.kind);
            document.getElementById('remote-video').srcObject = e.streams[0];
          };

          state.peerConnection.onicecandidate = e => {
            if (e.candidate) {
              console.log('[WebRTC] ICE candidate generated');
              state.socket.emit('webrtc_signal', { to: data.from, type: 'ice', candidate: e.candidate });
            }
          };

          state.peerConnection.onconnectionstatechange = () => {
            console.log('[WebRTC] Connection state:', state.peerConnection.connectionState);
            if (state.peerConnection?.connectionState === 'disconnected' || state.peerConnection?.connectionState === 'failed') {
              console.warn('[WebRTC] Connection failed/disconnected');
              endCall();
            }
          };

          console.log('[Call] Setting remote description from offer');
          await state.peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));

          // Flush buffered ICE candidates
          if (state.iceCandidateBuffer.length > 0) {
            console.log('[WebRTC] Flushing', state.iceCandidateBuffer.length, 'buffered ICE candidates');
            for (const candidate of state.iceCandidateBuffer) {
              try {
                await state.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
              } catch (err) {
                console.warn('[WebRTC] Error adding buffered ICE:', err.message);
              }
            }
            state.iceCandidateBuffer = [];
          }

          console.log('[Call] Creating answer');
          const answer = await state.peerConnection.createAnswer();

          console.log('[Call] Setting local description with answer');
          await state.peerConnection.setLocalDescription(answer);

          state.callState = 'connected';
          document.getElementById('call-status').textContent = 'Connected';

          console.log('[Call] Sending answer back to', data.from);
          state.socket.emit('webrtc_signal', { to: data.from, type: 'answer', sdp: answer });
        } catch (err) {
          console.error('[Call Error] Accepting offer:', err.name, err.message);
          let errorMsg = '❌ Call failed:\n\n';
          if (err.name === 'NotAllowedError') {
            errorMsg += 'Permission denied - Please allow camera/microphone access';
          } else if (err.name === 'NotFoundError') {
            errorMsg += 'No camera/microphone found on this device';
          } else if (err.name === 'InvalidStateError') {
            errorMsg += 'Call connection error - try again';
          } else {
            errorMsg += err.message || 'Could not accept call';
          }
          alert(errorMsg);
          console.log('[Call] Sending reject due to error:', err.name);
          state.socket.emit('webrtc_signal', { to: data.from, type: 'reject' });
          endCall();
        }

      } else if (data.type === 'answer') {
        console.log('[Call] Received answer from', data.from);
        if (!state.peerConnection) {
          console.warn('[Call] Received answer but no peer connection exists');
          return;
        }
        try {
          console.log('[Call] Setting remote description with answer');
          await state.peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
          state.callState = 'connected';

          // Flush buffered ICE candidates
          if (state.iceCandidateBuffer.length > 0) {
            console.log('[WebRTC] Flushing', state.iceCandidateBuffer.length, 'buffered ICE candidates');
            for (const candidate of state.iceCandidateBuffer) {
              try {
                await state.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
              } catch (err) {
                console.warn('[WebRTC] Error adding buffered ICE:', err.message);
              }
            }
            state.iceCandidateBuffer = [];
          }

          // Clear call timeout
          if (state.callTimeout) {
            clearTimeout(state.callTimeout);
            state.callTimeout = null;
          }

          document.getElementById('call-status').textContent = '✅ Connected';
          console.log('[Call] Connected!');
        } catch (err) {
          console.error('[WebRTC Error] Setting answer:', err.name, err.message);
        }

      } else if (data.type === 'ice') {
        console.log('[WebRTC] Received ICE candidate');
        if (!state.peerConnection) {
          console.warn('[WebRTC] Buffering ICE - no peer connection yet');
          state.iceCandidateBuffer.push(data.candidate);
          return;
        }
        try {
          await state.peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
          console.log('[WebRTC] ICE candidate added successfully');
        } catch (err) {
          console.warn('[WebRTC] ICE candidate error (may be normal):', err.message);
        }

      } else if (data.type === 'reject') {
        console.log('[Call] Call rejected by', data.from);
        alert(`❌ ${data.from} declined the call.`);
        endCall();

      } else if (data.type === 'end') {
        console.log('[Call] Call ended by', data.from);
        endCall();
      } else {
        console.warn('[Signal] Unknown signal type:', data.type);
      }
    }

    function endCall() {
      console.log('[Call] Ending call');

      // Clear ICE candidate buffer
      state.iceCandidateBuffer = [];

      // Clear call timeout
      if (state.callTimeout) {
        clearTimeout(state.callTimeout);
        state.callTimeout = null;
      }

      // Close peer connection
      if (state.peerConnection) {
        console.log('[WebRTC] Closing peer connection');
        try {
          state.peerConnection.close();
        } catch (err) {
          console.error('[WebRTC Error] Closing connection:', err);
        }
        state.peerConnection = null;
      }

      // Stop all tracks
      if (state.localStream) {
        console.log('[WebRTC] Stopping local stream tracks');
        state.localStream.getTracks().forEach(t => {
          try {
            t.stop();
          } catch (err) {
            console.error('[WebRTC Error] Stopping track:', err);
          }
        });
        state.localStream = null;
      }

      // Notify the other party
      if (state.callTarget && state.callState !== 'idle') {
        console.log('[Call] Notifying', state.callTarget, 'that call ended');
        state.socket.emit('webrtc_signal', { to: state.callTarget, type: 'end' });
      }

      // Clear UI
      document.getElementById('call-overlay').classList.remove('active');
      document.getElementById('remote-video').srcObject = null;
      document.getElementById('local-video').srcObject = null;

      // Reset state
      state.callTarget = null;
      state.callType = null;
      state.callState = 'idle';
      state.muted = false;
      state.camOff = false;

      // Reset button states
      document.getElementById('mute-btn').textContent = '🎙️';
      document.getElementById('cam-btn').textContent = '📷';
    }

    function toggleMute() {
      if (!state.localStream) return;
      state.muted = !state.muted;
      state.localStream.getAudioTracks().forEach(t => t.enabled = !state.muted);
      document.getElementById('mute-btn').textContent = state.muted ? '🔇' : '🎙️';
    }

    function toggleCam() {
      if (!state.localStream) return;
      state.camOff = !state.camOff;
      state.localStream.getVideoTracks().forEach(t => t.enabled = !state.camOff);
      document.getElementById('cam-btn').textContent = state.camOff ? '🚫' : '📷';
    }

    // ─── UTILS ────────────────────────────────────────────────────
    function stringToColor(str) {
      const colors = ['#1a5c3e', '#1a3a5c', '#5c1a3a', '#3a1a5c', '#5c3a1a', '#1a5c5c', '#5c1a1a', '#1a1a5c'];
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    }

    // Enter key for login
    document.getElementById('username-input').focus();
  </script>
